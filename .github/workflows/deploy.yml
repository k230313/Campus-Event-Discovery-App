name: CI and Deploy

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "client/**"
      - "server/**"
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Run backend smoke check
        run: npm test
        working-directory: server

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Connect runner to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Deploy to production over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 20m
          script_stop: true
          script: |
            set -e
            APP_DIR="/var/www/ceda/Campus-Event-Discovery-App"
            PM2_APP="ceda-backend"
            HEALTHCHECK_URL="http://127.0.0.1:3001/api/csrf-token"

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            cd "$APP_DIR/server"
            npm ci

            cd "$APP_DIR/client"
            npm ci
            npm run build

            cd "$APP_DIR/server"
            pm2 restart "$PM2_APP" --update-env
            pm2 save

            for i in {1..10}; do
              if curl -fsS "$HEALTHCHECK_URL" > /dev/null; then
                echo "Health check passed"
                exit 0
              fi

              echo "Waiting for backend..."
              sleep 3
            done

            echo "Health check failed"
            pm2 logs "$PM2_APP" --lines 30 --nostream
            exit 1
